name: publish-container

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: git.cubiss.cz
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build & push rp-sync
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            git.cubiss.cz/cubiss/rp-sync:latest
            git.cubiss.cz/cubiss/rp-sync:${{ gitea.sha }}

      - name: Build & push nginx
        uses: https://git.cubiss.cz/docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            git.cubiss.cz/cubiss/rp-sync-nginx:latest
            git.cubiss.cz/cubiss/rp-sync-nginx:${{ gitea.sha }}