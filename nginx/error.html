<!DOCTYPE html>
<html>
<head><title>Error <!--# echo var="status" --></title></head>
<body>
<h1><!--# echo var="status" --> <span id="msg"></span></h1>
<p>Served by <strong>rp-sync</strong>.</p>
<script>
var messages = {
  400: "Bad Request", 401: "Unauthorized", 403: "Forbidden", 404: "Not Found",
  429: "Too Many Requests", 500: "Internal Server Error", 502: "Bad Gateway",
  503: "Service Unavailable", 504: "Gateway Timeout"
};
var code = parseInt("<!--# echo var='status' -->");
document.getElementById("msg").textContent = messages[code] || "";
</script>
</body>
</html>
